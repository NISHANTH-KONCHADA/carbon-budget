# Render "Blueprint" — optional. You can also just create the Web Service
# manually in the Render dashboard and point it at the backend/ folder;
# this file just lets Render pick up the same settings automatically.
services:
  - type: web
    name: carbon-footprint-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
